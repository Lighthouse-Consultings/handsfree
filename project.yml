name: Handsfree
options:
  bundleIdPrefix: com.lighthouseconsultings
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    ARCHS: "arm64 x86_64"
    ONLY_ACTIVE_ARCH: NO

targets:
  Handsfree:
    type: application
    platform: macOS
    sources:
      - path: Handsfree
    resources:
      - path: Handsfree/Resources
    info:
      path: Handsfree/Info.plist
      properties:
        LSUIElement: true
        NSMicrophoneUsageDescription: "Handsfree uses the microphone to transcribe your speech into text."
        CFBundleName: Handsfree
        CFBundleShortVersionString: "0.5.0"
        CFBundleVersion: "1"
        NSHumanReadableCopyright: "© 2026 Lighthouse Consultings"
    entitlements:
      path: Handsfree/Handsfree.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.device.audio-input: true
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lighthouseconsultings.handsfree
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Handsfree/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  HandsfreeTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: Handsfree
